<!DOCTYPE html>
<html lang="en" style="overflow: hidden;">

<head>
    <meta charset="UTF-8">
    <title>Test HDR of your display</title>
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://jasonycw.github.io/screen-tests/background.jpg">
    <meta property="og:description" content="An HDR test, if it works. 😎">
    <meta property="og:site_name" content="Jason Yu">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Apply styles to the container div */
        .container {
            display: grid;
            grid-template-columns: 50% 50%;
            /* 2 columns */
            grid-template-rows: 50% 50%;
            /* 2 rows */
            height: 100vh;
            /* Full viewport height */
        }

        /* Apply styles to each individual div */
        .box {
            background-size: cover;
            /* Ensure images/videos fill the entire div */
        }

        /* Specify different background images or videos for each div */
        .box:nth-child(1) {
            background-image: url('./red/background.jpg');
            /* Replace with your image or video URL */
        }

        .box:nth-child(2) {
            background-image: url('./green/background.jpg');
            /* Replace with your image or video URL */
        }

        .box:nth-child(3) {
            background-image: url('./blue/background.jpg');
            /* Replace with your image or video URL */
        }

        .box:nth-child(4) {
            background-image: url('./white/background.jpg');
            /* Replace with your image or video URL */
        }
    </style>
</head>

<body style="margin: 0px; overflow: hidden;">
    <script>
        // Prevent screensaver from activating
        function preventScreensaver() {
            if ('wakeLock' in navigator) {
                navigator.wakeLock.request('screen')
                    .then(wakeLock => {
                        console.log('Screen Wake Lock acquired');
                        document.addEventListener('visibilitychange', async () => {
                            if (!document.hidden) {
                                try {
                                    await navigator.wakeLock.request('screen');
                                } catch (err) {
                                    console.log('Wake lock released:', err);
                                }
                            }
                        });
                    })
                    .catch(err => {
                        console.log('Wake Lock request failed:', err);
                        setInterval(() => {
                            document.dispatchEvent(new MouseEvent('mousemove'));
                        }, 30000);
                    });
            } else {
                setInterval(() => {
                    document.dispatchEvent(new MouseEvent('mousemove'));
                }, 30000);
            }
        }
        preventScreensaver();

        function goto(route) {
            var pathname = window.location.pathname;
            var lastSlashIndex = pathname.lastIndexOf("/");
            var currentUrl = window.location.origin + pathname.substring(0, lastSlashIndex).replace(/\/+$/, "") + window.location.search;
            var newUrl = currentUrl + route;
            window.open(newUrl);
        }
    </script>
    <div class="container">
        <div onclick="goto(`/red`)" class="box"></div>
        <div onclick="goto(`/green`)" class="box"></div>
        <div onclick="goto(`/blue`)" class="box"></div>
        <div onclick="goto(`/white`)" class="box"></div>
    </div>
</body>

</html>
