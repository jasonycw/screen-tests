<!DOCTYPE html>
<html lang="en" style="overflow: hidden;">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: url('background.jpg') no-repeat center center fixed;
            background-size: cover;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        .background-image-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        .background-image-container img {
            width: 100%;
            height: 100%;

            object-fit: cover;
            /* Ensures the image fills the screen without stretching/squishing */
            object-position: center;
            /* Keeps the most important part of the image centered */

            /* Disable user interactions */
            pointer-events: none;
            /* Disables clicks, right-clicks, and dragging entirely */
            user-select: none;
            /* Prevents text/element highlighting */
            -webkit-user-drag: none;
            /* Extra safeguard for Safari/Chrome dragging */
            -webkit-touch-callout: none;
            -webkit-user-select: none;
        }
    </style>
    <title>HDR yellow</title>
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://jasonycw.github.io/screen-tests/HDR/yellow/background.jpg">
    <meta property="og:description" content="An HDR test, if it works. 😎">
    <meta property="og:site_name" content="Jason Yu">
</head>

<body style="display: block;min-width: 100%;min-height: 100%;position: absolute;">
    <div class="background-image-container">
        <img src="background.jpg" alt="Background" draggable="false">
    </div>

    <script>
        // Prevent screensaver from activating
        function preventScreensaver() {
            if ('wakeLock' in navigator) {
                navigator.wakeLock.request('screen')
                    .then(wakeLock => {
                        console.log('Screen Wake Lock acquired');
                        document.addEventListener('visibilitychange', async () => {
                            if (!document.hidden) {
                                try {
                                    await navigator.wakeLock.request('screen');
                                } catch (err) {
                                    console.log('Wake lock released:', err);
                                }
                            }
                        });
                    })
                    .catch(err => {
                        console.log('Wake Lock request failed:', err);
                        setInterval(() => {
                            document.dispatchEvent(new MouseEvent('mousemove'));
                        }, 30000);
                    });
            } else {
                setInterval(() => {
                    document.dispatchEvent(new MouseEvent('mousemove'));
                }, 30000);
            }
        }
        preventScreensaver();
    </script>
    <script>
        document.getElementsByTagName('body')[0].addEventListener('click', () => {
            try {
                document.documentElement.requestFullscreen();
            } catch (err) {
                document.documentElement.webkitRequestFullScreen();
            }
        });
    </script>
</body>

</html>
