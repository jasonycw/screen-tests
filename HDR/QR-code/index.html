<!DOCTYPE html>
<html lang="en" style="overflow: hidden;">

<head>
    <meta charset="UTF-8">
    <title>HDR QR code</title>
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://jasonycw.github.io/screen-tests/HDR/QR-code/qr-code.png">
    <meta property="og:description" content="😎 QR code to 🌈">
    <meta property="og:site_name" content="Jason Yu">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
        }

        .qr-spinner-container {
            position: relative;
            width: 50vmin;
            height: 50vmin;
            background-color: #000;
            overflow: hidden;
            cursor: pointer;
            /* Feedback that it's clickable */
        }

        .spinner {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            animation: spin 12s linear infinite;
            pointer-events: none;
            /* Let clicks pass through to the container math */
        }

        .box {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background-size: cover;
            background-position: center;
            transform-origin: center center;
        }

        /* MATHEMATICAL BLEND: 51.428deg spacing. 
           Fades span the full distance between slice centers for a seamless cross-fade.
        */
        .box.standard-slice {
            -webkit-mask-image: conic-gradient(from -51.428571deg, transparent 0deg, black 51.428571deg, transparent 102.857142deg, transparent 360deg);
            mask-image: conic-gradient(from -51.428571deg, transparent 0deg, black 51.428571deg, transparent 102.857142deg, transparent 360deg);
        }

        .box.half-slice-start {
            -webkit-mask-image: conic-gradient(from 0deg, black 0deg, transparent 51.428571deg, transparent 360deg);
            mask-image: conic-gradient(from 0deg, black 0deg, transparent 51.428571deg, transparent 360deg);
        }

        .box.half-slice-end {
            -webkit-mask-image: conic-gradient(from -51.428571deg, transparent 0deg, black 51.428571deg, transparent 51.428571deg, transparent 360deg);
            mask-image: conic-gradient(from -51.428571deg, transparent 0deg, black 51.428571deg, transparent 51.428571deg, transparent 360deg);
        }

        /* Rotations */
        .box:nth-child(1) {
            background-color: red;
            transform: rotate(0deg);
            z-index: 1;
            --color-id: 'red';
        }

        .box:nth-child(2) {
            background-color: green;
            transform: rotate(51.428571deg);
            z-index: 2;
            --color-id: 'green';
        }

        .box:nth-child(3) {
            background-color: blue;
            transform: rotate(102.857142deg);
            z-index: 3;
            --color-id: 'blue';
        }

        .box:nth-child(4) {
            background-color: black;
            transform: rotate(154.285714deg);
            z-index: 4;
            --color-id: 'black';
        }

        .box:nth-child(5) {
            background-color: cyan;
            transform: rotate(205.714286deg);
            z-index: 5;
            --color-id: 'cyan';
        }

        .box:nth-child(6) {
            background-color: magenta;
            transform: rotate(257.142857deg);
            z-index: 6;
            --color-id: 'magenta';
        }

        .box:nth-child(7) {
            background-color: yellow;
            transform: rotate(308.571429deg);
            z-index: 7;
            --color-id: 'yellow';
        }

        .box:nth-child(8) {
            background-color: red;
            transform: rotate(360deg);
            z-index: 8;
            --color-id: 'red';
        }

        .box {
            background-image: var(--bg-img);
        }

        .box:nth-child(1),
        .box:nth-child(8) {
            --bg-img: url('../red/background.jpg');
        }

        .box:nth-child(2) {
            --bg-img: url('../green/background.jpg');
        }

        .box:nth-child(3) {
            --bg-img: url('../blue/background.jpg');
        }

        .box:nth-child(4) {
            /* --bg-img: url('../black/background.jpg'); */
        }

        .box:nth-child(5) {
            --bg-img: url('../cyan/background.jpg');
        }

        .box:nth-child(6) {
            --bg-img: url('../magenta/background.jpg');
        }

        .box:nth-child(7) {
            --bg-img: url('../yellow/background.jpg');
        }

        .mask-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #fff;
            -webkit-mask-image: url('./qr-code.png');
            mask-image: url('./qr-code.png');
            -webkit-mask-size: contain;
            mask-size: contain;
            -webkit-mask-repeat: no-repeat;
            mask-repeat: no-repeat;
            -webkit-mask-mode: luminance;
            mask-mode: luminance;
            pointer-events: none;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="qr-spinner-container" id="mainContainer">
        <div class="spinner" id="spinnerEl">
            <div class="box half-slice-start"></div>
            <div class="box standard-slice"></div>
            <div class="box standard-slice"></div>
            <div class="box standard-slice"></div>
            <div class="box standard-slice"></div>
            <div class="box standard-slice"></div>
            <div class="box standard-slice"></div>
            <div class="box half-slice-end"></div>
        </div>
        <div class="mask-overlay" id="qrMask"></div>
    </div>

    <script>
        /** 1. QR Content Logic **/
        const urlParams = new URLSearchParams(window.location.search);
        let customContent = urlParams.get('content');

        if (customContent) {
            try {
                while (customContent !== decodeURIComponent(customContent)) {
                    customContent = decodeURIComponent(customContent);
                }
            } catch (e) { }

            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=1000x1000&data=${encodeURIComponent(customContent)}`;
            const maskOverlay = document.getElementById('qrMask');
            maskOverlay.style.webkitMaskImage = `url('${qrUrl}')`;
            maskOverlay.style.maskImage = `url('${qrUrl}')`;
        }

        /** 2. Coordinate-based Click Logic **/
        const container = document.getElementById('mainContainer');
        const spinner = document.getElementById('spinnerEl');
        const colors = ['red', 'green', 'blue', 'white', 'cyan', 'magenta', 'yellow'];
        const sliceWidth = 360 / 7;

        container.addEventListener('click', (e) => {
            const rect = container.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            // Get angle of click relative to center (0deg is Top/12 o'clock)
            const rad = Math.atan2(e.clientY - centerY, e.clientX - centerX);
            let angle = rad * (180 / Math.PI) + 90;
            angle = (angle + 360) % 360;

            // Get current rotation of the spinner
            const style = window.getComputedStyle(spinner);
            const matrix = new WebKitCSSMatrix(style.transform);
            const currentRotation = (Math.round(Math.atan2(matrix.m12, matrix.m11) * (180 / Math.PI)) + 360) % 360;

            // Normalize click angle relative to the internal 0-point of the slices
            const relativeAngle = (angle - currentRotation + 360) % 360;

            // Calculate which index was hit. We shift by half a slice width to center the mapping.
            const index = Math.floor((relativeAngle + (sliceWidth / 2)) / sliceWidth) % 7;
            goto(`${colors[index]}`);
        });

        function goto(route) {
            const pathname = window.location.pathname;
            // Get the directory path (up to the last slash)
            const lastSlashIndex = pathname.lastIndexOf("/");
            const basePath = pathname.substring(0, lastSlashIndex);

            // Construct clean URL without current query strings
            const newUrl = window.location.origin + basePath + "/" + route;
            window.open(newUrl);
        }

        /** 3. Utility **/
        async function initWakeLock() {
            try {
                if ('wakeLock' in navigator) await navigator.wakeLock.request('screen');
            } catch (err) {
                setInterval(() => document.dispatchEvent(new MouseEvent('mousemove')), 30000);
            }
        }
        window.onload = initWakeLock;
    </script>
</body>

</html>
