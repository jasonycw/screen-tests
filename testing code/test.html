<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Text Effect</title>
    <style>
        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        .bg-video {
            width: 100%;
            height: 100%;
        }

        .text {
            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;
            background-color: white;
            /* Background color for better readability */
            color: black;
            /* Text color */
            font-weight: 900;
            font-size: 100px;
            font-family: sans-serif;
            mix-blend-mode: exclusion;
            /* Blend text with video */
        }
    </style>
</head>

<body>
    <script>
        // Prevent screensaver from activating
        function preventScreensaver() {
            if ('wakeLock' in navigator) {
                navigator.wakeLock.request('screen')
                    .then(wakeLock => {
                        console.log('Screen Wake Lock acquired');
                        document.addEventListener('visibilitychange', async () => {
                            if (!document.hidden) {
                                try {
                                    await navigator.wakeLock.request('screen');
                                } catch (err) {
                                    console.log('Wake lock released:', err);
                                }
                            }
                        });
                    })
                    .catch(err => {
                        console.log('Wake Lock request failed:', err);
                        setInterval(() => {
                            document.dispatchEvent(new MouseEvent('mousemove'));
                        }, 30000);
                    });
            } else {
                setInterval(() => {
                    document.dispatchEvent(new MouseEvent('mousemove'));
                }, 30000);
            }
        }
        preventScreensaver();
    </script>
    <div class="container">
        <video class="bg-video" autoplay loop>
            <source src="../HDR/white/white.webm" type="video/webm" />
            <source src="../HDR/white/white1.mp4" type="video/mp4" />
            <source src="../HDR/white/white2.mp4" type="video/mp4" />
        </video>
        <p class="text">AWESOME TEXT</p>
    </div>
</body>

</html>
